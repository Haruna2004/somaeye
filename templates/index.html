<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SomaEye | AI Surveillance by Pasoma</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', path='/css/style.css') }}"
    />
  </head>
  <body>
    <div class="dashboard-container">
      <!-- somaeye Style Header -->
      <header class="main-header">
        <div class="logo">SomaEye</div>
        <div class="header-tabs">
          <button class="tab-btn active" id="tabConfigBtn">Dashboard</button>
          <button class="tab-btn" id="tabMonitorBtn">Live Feeds</button>
        </div>
        <div class="status-pills">
          <button id="pauseBtn" class="btn-top {{ pause_class }}">
            {{ pause_label }}
          </button>
          <div class="status-indicator">
            <span id="connectionDot" class="status-dot dot-connecting"></span>
            <span id="connectionStatus">Connecting...</span>
          </div>
          <div
            class="status-indicator"
            style="--status-color: {{ status_color }}; --status-glow: {{ status_color }}80;"
          >
            <span id="systemDot" class="status-dot"></span>
            <span id="systemStatus">{{ status_text }}</span>
          </div>
        </div>
      </header>

      <main class="grid-layout" id="localConfigSection">
        <!-- Left: Configuration (Rules & Settings) -->
        <div class="main-feed-group">
          <!-- Rules Card -->
          <div class="card">
            <div class="card-title">Rules</div>
            <div class="prompt-group">
              <textarea
                id="promptInput"
                placeholder="Describe what the AI should look for... (e.g., 'Alert if someone is wearing a dark shirt and eyeglasses')"
                style="min-height: 150px; font-size: 1.1rem"
              ></textarea>
              <button
                id="savePromptBtn"
                class="btn-primary"
                style="align-self: flex-start; padding: 0.75rem 3rem"
              >
                Deploy
              </button>
            </div>
          </div>

          <!-- Settings Placeholder Card -->
          <!-- <div class="card" style="flex: 1">
            <div class="card-title">Settings</div>
            <div
              style="
                display: flex;
                flex-direction: column;
                gap: 2rem;
                margin-top: 1rem;
              "
            >
              <div>
                <label style="color: var(--text-secondary); font-size: 0.9rem"
                  >Confidence Threshold</label
                >
                <input
                  type="range"
                  style="width: 100%; margin-top: 0.5rem"
                  min="0"
                  max="100"
                  value="50"
                />
              </div>
              <div>
                <label style="color: var(--text-secondary); font-size: 0.9rem"
                  >Alert Cooldown (seconds)</label
                >
                <input
                  type="range"
                  style="width: 100%; margin-top: 0.5rem"
                  min="1"
                  max="10"
                  value="5"
                />
              </div>
            </div>
          </div> -->
        </div>

        <!-- Right: Alerts & Logs -->
        <div class="controls-sidebar">
          <div
            class="card"
            style="height: 100%; display: flex; flex-direction: column"
          >
            <div class="card-title">Alerts</div>
            <div
              id="log"
              class="incident-log"
              style="height: 100%; min-height: 500px"
            >
              <!-- Alerts will appear here -->
            </div>
          </div>
        </div>
      </main>

      <main class="grid-layout" id="monitorSection" style="display: none; padding-top: 1rem;">
        <div id="emptyGridState" style="grid-column: span 12; text-align: center; color: var(--text-secondary); padding: 4rem 1rem; border: 1px dashed var(--border); border-radius: 16px;">
          <h3 style="margin-bottom: 0.5rem; color: #fff;">No Cameras Connected</h3>
          <p>Open <b>/sender</b> on another device to start monitoring.</p>
        </div>
        <div class="feed-grid" id="monitorGrid" style="grid-column: span 12; display: none;">
          <!-- Remote cameras will be dynamically injected here... -->
        </div>
      </main>
    </div>

    <script src="{{ url_for('static', path='/js/main.js') }}?v={{ range(1, 1000000) | random }}"></script>
  </body>
</html>
